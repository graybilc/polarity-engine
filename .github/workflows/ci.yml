name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Check out repository
      uses: actions/checkout@v4

    # 2. Set up uv and pin the Python version
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true # Speeds up runs by caching your uv environment

    # 3. Ensure Python 3.13 is available
    - name: Set up Python
      run: uv python install 3.13

    # 4. Sync dependencies strictly using your uv.lock file
    - name: Install dependencies
      run: uv sync --frozen

    # 5. Execute the test suite within the uv virtual environment
    - name: Run test suite with Pytest
      env:
        PYTHONPATH: .
      run: |
        uv run pytest -v